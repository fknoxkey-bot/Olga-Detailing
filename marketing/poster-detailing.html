<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 864px;
    height: 1152px;
    background: #000000;
    font-family: 'Baloo 2', sans-serif;
  }
  .poster {
    width: 864px;
    height: 1152px;
    background: #000000;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 44px 56px 40px;
  }
  .logo {
    width: 190px;
    height: auto;
    margin-bottom: 6px;
  }
  h1 {
    font-weight: 800;
    font-size: 46px;
    text-align: center;
    line-height: 1.05;
    margin-top: 6px;
  }
  .tagline {
    font-weight: 600;
    font-size: 17px;
    color: #a9a9a9;
    letter-spacing: 0.01em;
    margin-top: 8px;
    text-align: center;
  }
  .services {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 34px;
    width: 100%;
  }
  .service {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 20px 22px 16px;
    border: 1.5px solid rgba(255,255,255,0.22);
    border-radius: 16px;
    width: 216px;
  }
  .service .icon {
    width: 60px;
    height: 54px;
    fill: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .service .icon svg { width: 100%; height: auto; display: block; }
  .service .name {
    font-weight: 700;
    font-size: 22px;
  }
  .bullets {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
  }
  .bullets div {
    font-weight: 600;
    font-size: 25px;
    color: #eeeeee;
    text-align: center;
  }
  .cta-label {
    font-weight: 700;
    font-size: 32px;
    margin-top: 38px;
    text-align: center;
  }
  .phone {
    font-weight: 800;
    font-size: 66px;
    color: #d98358;
    margin-top: 6px;
    letter-spacing: 0.01em;
    text-align: center;
  }
  .qr-box {
    background: #ffffff;
    border-radius: 12px;
    padding: 14px;
    margin-top: 30px;
  }
  .qr-box img {
    width: 210px;
    height: 210px;
    display: block;
  }
</style>
</head>
<body>
  <div class="poster">
    <img class="logo" src="../images/logo-full.png" alt="">

    <div class="tagline">Serving Orcas Island &amp; the San Juan Islands</div>

    <div class="bullets">

      <div>Wash, polish, wax &amp; ceramic coating</div>
      <div>Custom quotes for planes &amp; boats</div>
      <div>Premium, professional results</div>

    <div class="phone">360-472-5492</div>

    <div class="qr-box">
      <img src="qr-website.png" alt="Scan for our website">
    </div>
  </div>

</html>
