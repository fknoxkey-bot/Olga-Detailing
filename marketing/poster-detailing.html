<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 864px;
    height: 1152px;
    background: #000000;
    font-family: 'Baloo 2', sans-serif;
  }
  .poster {
    width: 864px;
    height: 1152px;
    background: #000000;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 44px 56px 40px;
  }
  .logo {
    width: 190px;
    height: auto;
    margin-bottom: 6px;
  }
  h1 {
    font-weight: 800;
    font-size: 46px;
    text-align: center;
    line-height: 1.05;
    margin-top: 6px;
  }
  .tagline {
    font-weight: 600;
    font-size: 17px;
    color: #a9a9a9;
    letter-spacing: 0.01em;
    margin-top: 8px;
    text-align: center;
  }
  .services {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 34px;
    width: 100%;
  }
  .service {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 20px 22px 16px;
    border: 1.5px solid rgba(255,255,255,0.22);
    border-radius: 16px;
    width: 216px;
  }
  .service .icon {
    width: 66px;
    height: 60px;
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .service .icon svg { width: 100%; height: auto; display: block; stroke: currentColor; }
  .service .name {
    font-weight: 700;
    font-size: 22px;
  }
  .bullets {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
  }
  .bullets div {
    font-weight: 600;
    font-size: 25px;
    color: #eeeeee;
    text-align: center;
  }
  .cta-label {
    font-weight: 700;
    font-size: 32px;
    margin-top: 38px;
    text-align: center;
  }
  .phone {
    font-weight: 800;
    font-size: 66px;
    color: #d98358;
    margin-top: 6px;
    letter-spacing: 0.01em;
    text-align: center;
  }
  .qr-box {
    background: #ffffff;
    border-radius: 12px;
    padding: 14px;
    margin-top: 30px;
  }
  .qr-box img {
    width: 210px;
    height: 210px;
    display: block;
  }
</style>
</head>
<body>
  <div class="poster">
    <img class="logo" src="../images/logo-full.png" alt="">
    <h1>Professional Detailing</h1>
    <div class="tagline">Serving Orcas Island &amp; the San Juan Islands</div>

    <div class="services">
      <div class="service">
        <div class="icon"><svg
  xmlns="http://www.w3.org/2000/svg"
  width="24"
  height="24"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2" />
  <circle cx="7" cy="17" r="2" />
  <path d="M9 17h6" />
  <circle cx="17" cy="17" r="2" />
</svg>
</div>
        <div class="name">Auto</div>
      </div>
      <div class="service">
        <div class="icon"><svg
  xmlns="http://www.w3.org/2000/svg"
  width="24"
  height="24"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z" />
</svg>
</div>
        <div class="name">Plane</div>
      </div>
      <div class="service">
        <div class="icon"><svg
  xmlns="http://www.w3.org/2000/svg"
  width="24"
  height="24"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <path d="M10 2v15" />
  <path d="M7 22a4 4 0 0 1-4-4 1 1 0 0 1 1-1h16a1 1 0 0 1 1 1 4 4 0 0 1-4 4z" />
  <path d="M9.159 2.46a1 1 0 0 1 1.521-.193l9.977 8.98A1 1 0 0 1 20 13H4a1 1 0 0 1-.824-1.567z" />
</svg>
</div>
        <div class="name">Boat</div>
      </div>
    </div>

    <div class="bullets">
      <div>We come to you</div>
      <div>Wash, polish, wax &amp; ceramic coating</div>
      <div>Custom quotes for planes &amp; boats</div>
      <div>Premium, professional results</div>
    </div>

    <div class="cta-label">Book your detail today:</div>
    <div class="phone">360-472-5492</div>

    <div class="qr-box">
      <img src="qr-website.png" alt="Scan for our website">
    </div>
  </div>
</body>
</html>
