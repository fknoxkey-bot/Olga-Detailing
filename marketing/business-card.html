<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  @page { size: 3.5in 2in; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 3.5in;
    height: 2in;
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  .card {
    width: 3.5in;
    height: 2in;
    background: #000000;
    color: #ffffff;
    display: flex;
    align-items: center;
    padding: 0 0.2in;
  }
  .left {
    width: 1.05in;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .left img {
    width: 1.0in;
    height: auto;
  }
  .divider {
    width: 1.5px;
    align-self: stretch;
    margin: 0.2in 0.2in;
    background: #ffffff;
    flex-shrink: 0;
  }
  .right {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 0.06in;
  }
  h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 13.5pt;
    color: #ffffff;
    line-height: 1.05;
  }
  .sub {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 6.6pt;
    color: #d8d8d8;
    line-height: 1.3;
    max-width: 1.5in;
    margin-bottom: 0.01in;
  }
  .qr-box {
    background: #ffffff;
    border-radius: 0.045in;
    padding: 0.045in;
    display: flex;
  }
  .qr-box img {
    width: 0.58in;
    height: 0.58in;
    display: block;
  }
  .qr-caption {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.01in;
    margin-top: -0.01in;
  }
  .qr-caption .label {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 7.6pt;
    color: #ffffff;
  }
  .qr-caption .small {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 6pt;
    color: #b7b7b7;
  }
  .phone-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.06in;
    margin-top: 0.02in;
  }
  .phone-row svg { flex-shrink: 0; width: 11px; height: 11px; }
  .phone-row .label {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 7.6pt;
    color: #ffffff;
  }
  .site-row {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 6.2pt;
    color: #b7b7b7;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="left">
      <img src="../images/logo-full.png" alt="">
    </div>
    <div class="divider"></div>
    <div class="right">
      <h1>Mobile Detailing</h1>
      <div class="sub">Auto, Plane &amp; Boat Detailing</div>
      <div class="qr-box">
        <img src="qr-website.png" alt="Scan for our website">
      </div>
      <div class="qr-caption">
        <div class="label">Scan to Book</div>
        <div class="small">or view pricing</div>
      </div>
      <div class="phone-row">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6.6 10.8C8 13.6 10.4 16 13.2 17.4L15.4 15.2C15.7 14.9 16.1 14.8 16.5 14.9C17.7 15.3 19 15.5 20.3 15.5C20.9 15.5 21.3 15.9 21.3 16.5V20.3C21.3 20.9 20.9 21.3 20.3 21.3C10.5 21.3 2.7 13.5 2.7 3.7C2.7 3.1 3.1 2.7 3.7 2.7H7.5C8.1 2.7 8.5 3.1 8.5 3.7C8.5 5 8.7 6.3 9.1 7.5C9.2 7.9 9.1 8.3 8.8 8.6L6.6 10.8Z" fill="white"/>
        </svg>
        <span class="label">(360) 472-5492</span>
      </div>
      <div class="site-row">olgadetailing.com</div>
    </div>
  </div>
</body>
</html>
